name: Daily ETF Data Tracker

on:
  schedule:
    # 台灣時間每天 17:30 執行 (UTC 09:30)
    - cron: '30 9 * * 1-5' 
  workflow_dispatch: # 讓你可以點按鈕立即測試

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 賦予機器人寫入檔案的權限

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run ETF Tracker
      run: python daily_etf_tracker.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add daily_etf_data/*.csv
        git commit -m "Auto-update ETF data: $(date +'%Y-%m-%d')" || exit 0
        git push
